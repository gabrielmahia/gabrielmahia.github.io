# NOMINATION 2: swahili-civic-nlp

name: swahili-civic-nlp
description: >
  Open NLP dataset of annotated Swahili civic, financial, and educational sentences 
  for training and evaluating East African language AI systems. Covers Kenyan 
  government services, constitutional rights, M-PESA financial terms, and county 
  administration. Published on HuggingFace under CC BY 4.0.
type: Open Data
repository_url: https://huggingface.co/datasets/gmahia/swahili-civic-nlp
license: CC BY 4.0
owner_name: Gabriel Mahia
owner_contact: contact@aikungfu.dev

sdgs:
  - SDG 10: Reduced Inequalities — closes the Swahili language AI gap
  - SDG 16: Peace & Justice — civic knowledge access in local language
  - SDG 4: Quality Education — educational AI data in Swahili
  - SDG 17: Partnerships — open data for research community

countries:
  - Kenya (primary)
  - Tanzania, Uganda (Swahili-speaking countries)
