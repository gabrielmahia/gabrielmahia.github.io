---
# NOMINATION 1: mpesa-mcp

name: mpesa-mcp
description: >
  Model Context Protocol server for Kenya's M-PESA Daraja API. Enables AI agents 
  (Claude, GPT-4, Gemini) to interact with M-PESA — Kenya's dominant mobile money 
  platform with 35M+ users — natively via MCP tool calls. First African payment API 
  in the MCP ecosystem. Available on PyPI under MIT license.
type: Open Source Software
repository_url: https://github.com/gabrielmahia/mpesa-mcp
license: MIT
owner_name: Gabriel Mahia
owner_contact: contact@aikungfu.dev
website: https://gabrielmahia.github.io

# SDG alignment
sdgs:
  - SDG 1: No Poverty — financial inclusion via mobile money access
  - SDG 8: Decent Work — small business payment infrastructure
  - SDG 10: Reduced Inequalities — democratic access to financial tools
  - SDG 17: Partnerships — open developer infrastructure

# DPG Standard indicators
open_source: true
open_data: false  # (not applicable — this is software)
open_ai_model: false
open_standards: true  # implements MCP open standard
open_content: false

# Countries of implementation
countries:
  - Kenya (primary)
  - Tanzania, Uganda, Rwanda (M-PESA expansion markets)

# Clear relevance
relevance: >
  M-PESA is the world's most successful mobile money deployment. 
  It processes transactions representing 50%+ of Kenya's GDP. 
  mpesa-mcp makes this infrastructure programmable by AI agents — 
  enabling a new generation of financial inclusion tools without 
  requiring each developer to re-implement the Daraja API integration.

