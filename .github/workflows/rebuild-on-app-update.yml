name: Rebuild on app update

on:
  repository_dispatch:
    types: [app_updated]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Log trigger
        run: |
          echo "Triggered by: ${{ github.event.client_payload.repo }}"
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deploy
        uses: actions/deploy-pages@v4
